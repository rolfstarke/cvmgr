# Model Directory Structure for will be something like this the following
# only autolabel model will be used for autolabeling obviously
# only yolo training arguments are supported, check the naming, "model" excluded

# models/
# ├── dataset_name/
# │   ├── autolabel/           
# │   │   ├── results/             
# │   │   └── metadata.yaml        
# │   ├── yolo11s_standard/
 
default_training_config:
  epochs: 1
  model: yolo26n-seg
  name: default
  imgsz: 1280
  time: 24 # Time in hours 
  patience: 30 # number of epochs with no improvement before stopping
  batch: 4 # Use the default "chunks" to split the dataset for computation, -1 is auto 60% GPU utilization
  save: true
  cache: true
  device: [-1,-1,-1,-1]



