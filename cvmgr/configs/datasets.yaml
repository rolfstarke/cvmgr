oi_v7_custom_negative:
  # Hard negatives for mark_lane_leuthener_21: indoor commercial/office/building scenes
  # Classes chosen to (a) appear in the same environments and (b) be visually close to
  # mark_lane targets without being the targets themselves.
  samples_per_class: 500
  host: fiftyone_zoo
  origin: open-images-v7
  type: "detections"
  download_splits: ["train", "validation", "test"]
  download_classes:
    - "Couch"
    - "Table"
    - "Cabinetry"      
    - "Fireplace"      
    - "Refrigerator"   
    - "Ceiling fan"    
    - "Escalator"      
    - "Shelf"          
    - "Light bulb"     
    - "Lamp"           
    - "Clock"          
    - "Picture frame"  
    - "Bidet"          
    - "Bathtub"        
    - "Shower"         
    - "Countertop"     
    - "Picture frame"  
    - "Whiteboard"     
    - "Curtain"        
    - "Window blind"   
  export_splits: ["train"]
  export_classes: 
    # export classes here are just used for sam3 segmentation
    - "Boiler"
    - "Carpet"
    - "Ceiling light"
    - "Conference chair"
    - "Desk"
    - "Desk chair"
    - "Door"
    - "Elevator"
    - "Emergency exit sign"
    - "Faucet"
    - "Filing cabinet"
    - "Glass external"
    - "Glass internal"
    - "Heater"
    - "Mirror"
    - "Sink"
    - "Toilet"
    - "Vent"    
  hard_negatives:
    Boiler:               Refrigerator
    Carpet:               Table
    Ceiling light:        Ceiling fan
    Conference chair:     Couch
    Desk:                 Table
    Desk chair:           Couch
    Door:                 Picture frame
    Elevator:             Door
    Emergency exit sign:  Whiteboard
    Faucet:               Shower
    Filing cabinet:       Cabinetry
    Glass external:        Picture frame
    Radiator:             Filing cabinet
    Mirror:               Picture frame
    Sink:                 Shower
    Toilet:               Shower
    Vent:                 Ceiling fan
    Window:               Picture frame


