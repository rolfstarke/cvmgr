# dataset names must match fiftyone — schema:
#   host:              "fiftyone_zoo" or "roboflow"  → fetch_dataset
#   origin:            zoo dataset name              → fiftyone_download
#   type:     label type                    → fiftyone_download
#   download_splits:   splits to fetch               → fiftyone_download, roboflow_download
#   download_classes:  classes to fetch / DMS detection label → fiftyone_download, apple_dms_download
#   samples_per_class: per-class cap                 → fiftyone_download
#   samples_per_split: per-split cap                 → fiftyone_download
#   export_splits:     splits to export              → export_yolo
#   export_classes:    class list for export         → export_yolo
#   api_key/workspace/project/version/format:        → roboflow_download (roboflow only)
#   dms_class_id:      material class ID              → apple_dms_download (apple_dms only)



