# the dataset names must match fiftyone
# the splits 

mock_data_1:
  samples_per_split: 100
  host: fiftyone_zoo
  origin: open-images-v7
  download_type: &type1 "detections"    
  download_splits: &splits1 ["train", "val", "test"]  
  download_classes: &classes1            
    - "Door"
  export_splits: *splits1                 
  export_classes: *classes1              
  export_type: *type1   
    

mock_data_2:
  samples_per_split: 100
  host: fiftyone_zoo
  origin: open-images-v7
  download_type: &type2 "detections"
  download_splits: &splits2 ["train", "val", "test"]
  download_classes: &classes2
    - "Door handle"
  export_splits: *splits2
  export_classes: *classes2
  export_type: *type2

